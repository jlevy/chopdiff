# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: CI

on:
  push:
    # Use ["main", "master"] for CI only on the default branch.
    # Use ["**"] for CI on all branches.
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

env:
  UV_CONFIG_FILE: .uv-policy.toml

jobs:
  build:
    strategy:
      matrix:
        os: ["ubuntu-latest"]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        include:
          - os: macos-latest
            python-version: "3.13"

    runs-on: ${{ matrix.os }}

    steps:

      # Generally following uv docs:
      # https://docs.astral.sh/uv/guides/integration/github/

      - name: Checkout (official GitHub action)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Important for versioning plugins:
          fetch-depth: 0

      # From debugging the cydifflib build failure.
      # Confirmed we have version 3.31.6 installed.
      - name: Display CMake Version
        run: cmake --version

      - name: Install uv (official Astral action)
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.25"
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Set up Python (using uv)
        run: uv python install

      # Alternately can use the official Python action:
      # - name: Set up Python (using actions/setup-python)
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: ${{ matrix.python-version }}

      # Supply-chain hardening: install exactly what the committed lockfile pins
      # (fails if pyproject.toml and uv.lock have drifted). The cool-off cutoff lives
      # in [tool.uv] exclude-newer in pyproject.toml, so it applies at lock, sync, and
      # run time without a separate CI step. See SUPPLY-CHAIN-SECURITY.md.
      - name: Install all dependencies
        run: uv sync --all-extras --locked

      - name: Run linting
        # Check-only mode so CI fails on unformatted code instead of fixing it.
        run: uv run --locked python devtools/lint.py --check

      - name: Run tests
        run: uv run --locked pytest

  # Supply-chain audit gate. See SUPPLY-CHAIN-SECURITY.md.
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (official GitHub action)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Install uv (official Astral action)
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.25"
          enable-cache: true

      - name: Audit dependencies for known vulnerabilities
        run: uv run --locked --all-extras --group audit pip-audit

  # Packaging check: the chopdiff wheel must import cleanly from an isolated install —
  # not just from the source tree. flexdoc arrives as a normal PyPI dependency.
  wheel-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (official GitHub action)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Needed for the dynamic-versioning build backend (reads git tags).
          fetch-depth: 0

      - name: Install uv (official Astral action)
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.25"
          enable-cache: true

      - name: Build the wheel
        run: uv build --wheel --no-sources

      - name: Install the wheel in an isolated venv and import chopdiff
        run: |
          uv venv /tmp/wheelsmoke
          VENV_PY=/tmp/wheelsmoke/bin/python
          uv pip install --python "$VENV_PY" dist/*.whl
          "$VENV_PY" -c "import chopdiff; from chopdiff.transforms import sliding_para_window; from flexdoc import FlexDoc; print('wheel imports OK:', chopdiff.__name__, FlexDoc.__name__)"
