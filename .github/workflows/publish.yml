name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch: # Enable manual trigger.

env:
  UV_CONFIG_FILE: .uv-policy.toml

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Mandatory for OIDC.
      contents: read
    steps:
      - name: Checkout (official GitHub action)
        # Pinned to a full commit SHA (see supply-chain notes in
        # docs/development.md); bump deliberately when updating.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Important for versioning plugins:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv (official Astral action)
        # Pinned to a full commit SHA (see note in ci.yml).
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.25"
          # uv-x86_64-unknown-linux-gnu.
          checksum: "1db18b5e76fa645a7f3865773139bdec8e2d46adbdbb35e7410b34fa8015ccd2"
          enable-cache: true
          python-version: "3.12"

      - name: Set up Python (using uv)
        run: uv python install

      - name: Install all dependencies
        # Install from the committed lockfile so the release is built and tested
        # against the exact vetted versions (the pyproject cool-off governs upgrades).
        run: uv sync --all-extras --all-groups --locked

      - name: Run linting
        run: uv run --locked python devtools/lint.py --check

      - name: Run tests
        run: uv run --locked pytest

      - name: Audit dependencies for known vulnerabilities
        run: uv run --locked --all-extras --group audit pip-audit

      - name: Build package
        run: uv build --python .venv/bin/python --no-build-isolation --no-sources

      - name: Validate the source distribution manifest
        run: uv run --locked python devtools/validate_sdist.py

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
        # Although uv is newer and faster, the "official" publishing option is the one from PyPA,
        # which uses twine. If desired, replace `uv publish` with a reviewed full SHA:
        # uses: pypa/gh-action-pypi-publish@FULL_COMMIT_SHA # reviewed release/v1 commit
