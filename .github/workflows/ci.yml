# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: CI

on:
  push:
    # Use ["main", "master"] for CI only on the default branch.
    # Use ["**"] for CI on all branches.
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

env:
  UV_CONFIG_FILE: .uv-policy.toml

jobs:
  build:
    strategy:
      matrix:
        os: ["ubuntu-latest"]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        include:
          - os: macos-latest
            python-version: "3.13"

    runs-on: ${{ matrix.os }}

    steps:

      # Generally following uv docs:
      # https://docs.astral.sh/uv/guides/integration/github/

      - name: Checkout (official GitHub action)
        # Pinned to a full commit SHA (see supply-chain notes in
        # docs/development.md); bump deliberately when updating.
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Important for versioning plugins:
          fetch-depth: 0
          persist-credentials: false

      # From debugging the cydifflib build failure.
      # Confirmed we have version 3.31.6 installed.
      - name: Display CMake Version
        run: cmake --version

      - name: Install uv (official Astral action)
        # Pinned to a full commit SHA. Bump the action, uv version, and checksums
        # together when updating.
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.25"
          checksum: ${{ runner.os == 'Linux' && '1db18b5e76fa645a7f3865773139bdec8e2d46adbdbb35e7410b34fa8015ccd2' || runner.arch == 'ARM64' && '5fc334bb25d19806262efd1f6e7d380155c7e817d89bf426df4ba7ae873c9471' || '65ff85b33212f75d34d7c0f0724aba9a742c74f62559f67dc0d6c543dc2fc52f' }}
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Set up Python (using uv)
        run: uv python install

      # Alternately can use the official Python action:
      # Pin a reviewed full commit SHA before enabling it.
      # - name: Set up Python (using actions/setup-python)
      #   uses: actions/setup-python@FULL_COMMIT_SHA # reviewed version
      #   with:
      #     python-version: ${{ matrix.python-version }}

      # Supply-chain hardening: install exactly what the committed lockfile pins
      # (fails if pyproject.toml and uv.lock have drifted). The cool-off cutoff lives
      # in [tool.uv] exclude-newer in pyproject.toml, so it applies at lock, sync, and
      # run time without a separate CI step. See SUPPLY-CHAIN-SECURITY.md.
      - name: Install all dependencies
        run: uv sync --all-extras --all-groups --locked

      - name: Run linting
        # Check-only mode so CI fails on unformatted code instead of fixing it.
        run: uv run --locked python devtools/lint.py --check

      - name: Run tests
        run: uv run --locked pytest

  # Supply-chain audit gate. See SUPPLY-CHAIN-SECURITY.md.
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (official GitHub action)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv (official Astral action)
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.25"
          checksum: "1db18b5e76fa645a7f3865773139bdec8e2d46adbdbb35e7410b34fa8015ccd2"
          enable-cache: true

      - name: Install all dependencies
        run: uv sync --all-extras --all-groups --locked

      - name: Audit dependencies for known vulnerabilities
        run: uv run --locked --all-extras --group audit pip-audit

  # Packaging check: release artifacts must stay minimal and the wheel must import
  # cleanly from an isolated install, with flexdoc arriving as a PyPI dependency.
  wheel-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (official GitHub action)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Needed for the dynamic-versioning build backend (reads git tags).
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv (official Astral action)
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.25"
          checksum: "1db18b5e76fa645a7f3865773139bdec8e2d46adbdbb35e7410b34fa8015ccd2"
          enable-cache: true

      - name: Install all dependencies
        run: uv sync --all-extras --all-groups --locked

      - name: Build release artifacts
        run: uv build --python .venv/bin/python --no-build-isolation --no-sources

      - name: Validate the source distribution manifest
        run: uv run --locked python devtools/validate_sdist.py

      - name: Install the wheel in an isolated venv and import chopdiff
        run: |
          uv venv /tmp/wheelsmoke
          VENV_PY=/tmp/wheelsmoke/bin/python
          uv pip install --python "$VENV_PY" dist/*.whl
          "$VENV_PY" -c "import chopdiff; from chopdiff.transforms import sliding_para_window; from flexdoc import FlexDoc; print('wheel imports OK:', chopdiff.__name__, FlexDoc.__name__)"
